<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetFlow - Login</title>
    <!-- Global Design System -->
    <link rel="stylesheet" href="./styles/index.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background-color: var(--color-bg-app); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    
    <!-- 3. Layout Wrapper (Centered single-column layout for Auth) -->
    <main class="content-wrapper d-flex align-items-center justify-content-center p-4">
        
        <!-- Login placeholder shell using Shared Components (Cards, Buttons, Inputs) -->
        <div class="card-base w-100" style="max-width: 440px;">
            <div class="text-center mb-6 mt-2">
                <div class="d-inline-flex align-items-center justify-content-center mb-4" style="width: 48px; height: 48px; border-radius: var(--radius-lg); background-color: var(--color-primary-light);">
                    <i data-lucide="boxes" class="text-primary" style="width: 24px; height: 24px;"></i>
                </div>
                <h1 class="text-h3 font-bold mb-1">Welcome to AssetFlow</h1>
                <p class="text-muted text-small">Please log in to your account</p>
            </div>
            
            <!-- We only implement the layout wrapper and shared components foundation -->
            <!-- The actual auth forms logic and content will be implemented later -->

        </div>

    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
